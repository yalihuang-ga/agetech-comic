<!-- 復古麥克風 SVG -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <title>語音輸入麥克風</title>
  <desc>一個復古造型的麥克風按鈕，按住即可說話</desc>
  <!-- 粗邊框與高對比底色 -->
  <rect x="30" y="10" width="40" height="50" rx="20" fill="#D4AC2F" stroke="#1E1E24" stroke-width="6"/>
  <!-- 麥克風網格細節 -->
  <line x1="40" y1="25" x2="60" y2="25" stroke="#1E1E24" stroke-width="4" stroke-linecap="round"/>
  <line x1="35" y1="35" x2="65" y2="35" stroke="#1E1E24" stroke-width="4" stroke-linecap="round"/>
  <line x1="40" y1="45" x2="60" y2="45" stroke="#1E1E24" stroke-width="4" stroke-linecap="round"/>
  <!-- 支架與底座 -->
  <path d="M 25 40 A 25 25 0 0 0 75 40" fill="none" stroke="#1E1E24" stroke-width="6" stroke-linecap="round"/>
  <line x1="50" y1="65" x2="50" y2="85" stroke="#1E1E24" stroke-width="6" stroke-linecap="round"/>
  <line x1="30" y1="85" x2="70" y2="85" stroke="#1E1E24" stroke-width="6" stroke-linecap="round"/>
</svg>
