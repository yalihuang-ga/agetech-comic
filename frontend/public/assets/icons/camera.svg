<!-- 拍立得相機 SVG -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <title>拍照上傳</title>
  <desc>一台照相機，點擊即可拍攝照片</desc>
  <!-- 相機主體 -->
  <rect x="15" y="25" width="70" height="55" rx="8" fill="#D4AC2F" stroke="#1E1E24" stroke-width="6"/>
  <!-- 鏡頭 -->
  <circle cx="50" cy="55" r="16" fill="#FFFFFF" stroke="#1E1E24" stroke-width="6"/>
  <circle cx="50" cy="55" r="6" fill="#1E1E24"/>
  <!-- 閃光燈 -->
  <rect x="70" y="32" width="8" height="8" rx="2" fill="#FAF6EE" stroke="#1E1E24" stroke-width="4"/>
  <!-- 頂部快門按鈕 -->
  <rect x="25" y="15" width="15" height="10" rx="3" fill="#3E2C23" stroke="#1E1E24" stroke-width="6"/>
</svg>
