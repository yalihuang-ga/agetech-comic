<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-hidden="true">
  <!-- 第一格：早晨起床 -->
  <rect width="400" height="400" fill="#fff6e6"/>
  <rect y="260" width="400" height="140" fill="#e7d3a8"/>
  <!-- 窗與朝陽 -->
  <rect x="40" y="40" width="120" height="120" rx="8" fill="#bfe6ff" stroke="#5a4632" stroke-width="6"/>
  <line x1="100" y1="40" x2="100" y2="160" stroke="#5a4632" stroke-width="5"/>
  <line x1="40" y1="100" x2="160" y2="100" stroke="#5a4632" stroke-width="5"/>
  <circle cx="130" cy="70" r="18" fill="#ffd23f"/>
  <!-- 床 -->
  <rect x="150" y="250" width="220" height="70" rx="10" fill="#f4a6a0"/>
  <rect x="150" y="230" width="70" height="40" rx="10" fill="#ffffff"/>
  <!-- 長輩頭 -->
  <circle cx="200" cy="235" r="30" fill="#f7d4ab"/>
  <path d="M172 232 a28 28 0 0 1 56 0z" fill="#d8d8d8"/>
  <circle cx="192" cy="235" r="4" fill="#2a2118"/>
  <circle cx="212" cy="235" r="4" fill="#2a2118"/>
  <path d="M192 248 q8 8 16 0" fill="none" stroke="#7a4a2a" stroke-width="4" stroke-linecap="round"/>
  <!-- 早安 zzz -->
  <text x="270" y="150" font-size="42" fill="#e0902a" font-family="sans-serif">☀</text>
</svg>
