<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 850" role="img" aria-hidden="true">
  <!-- 單張 2×2 四格漫畫示意（對齊後端「單張四格圖」策略；閱讀順序：左上→右上→左下→右下）
       版式與 api-contract-additions.md §1-1 一致：四格等分、邊距/格線固定，前端象限高亮以 50%×50% 對位 -->
  <rect width="850" height="850" fill="#fffdf7"/>

  <!-- 第一格（左上）：早晨起床 -->
  <g transform="translate(15,15)">
    <rect width="400" height="400" fill="#fff6e6"/>
    <rect y="260" width="400" height="140" fill="#e7d3a8"/>
    <rect x="40" y="40" width="120" height="120" rx="8" fill="#bfe6ff" stroke="#5a4632" stroke-width="6"/>
    <line x1="100" y1="40" x2="100" y2="160" stroke="#5a4632" stroke-width="5"/>
    <line x1="40" y1="100" x2="160" y2="100" stroke="#5a4632" stroke-width="5"/>
    <circle cx="130" cy="70" r="18" fill="#ffd23f"/>
    <rect x="150" y="250" width="220" height="70" rx="10" fill="#f4a6a0"/>
    <rect x="150" y="230" width="70" height="40" rx="10" fill="#ffffff"/>
    <circle cx="200" cy="235" r="30" fill="#f7d4ab"/>
    <path d="M172 232 a28 28 0 0 1 56 0z" fill="#d8d8d8"/>
    <circle cx="192" cy="235" r="4" fill="#2a2118"/>
    <circle cx="212" cy="235" r="4" fill="#2a2118"/>
    <path d="M192 248 q8 8 16 0" fill="none" stroke="#7a4a2a" stroke-width="4" stroke-linecap="round"/>
    <text x="270" y="150" font-size="42" fill="#e0902a" font-family="sans-serif">☀</text>
    <rect width="400" height="400" fill="none" stroke="#5a4632" stroke-width="6"/>
  </g>

  <!-- 第二格（右上）：出門到某地 -->
  <g transform="translate(435,15)">
    <rect width="400" height="400" fill="#dff2ff"/>
    <circle cx="330" cy="70" r="34" fill="#ffd23f"/>
    <rect y="300" width="400" height="100" fill="#8fce7a"/>
    <rect x="70" y="210" width="20" height="100" fill="#7a5230"/>
    <circle cx="80" cy="190" r="50" fill="#4fae52"/>
    <path d="M150 400 L210 300 H260 L230 400 Z" fill="#cbb994"/>
    <circle cx="210" cy="235" r="26" fill="#f7d4ab"/>
    <path d="M186 233 a24 24 0 0 1 48 0z" fill="#d8d8d8"/>
    <circle cx="203" cy="235" r="3.5" fill="#2a2118"/>
    <circle cx="219" cy="235" r="3.5" fill="#2a2118"/>
    <path d="M202 247 q9 7 18 0" fill="none" stroke="#7a4a2a" stroke-width="4" stroke-linecap="round"/>
    <rect x="192" y="262" width="36" height="60" rx="14" fill="#e85d5d"/>
    <line x1="238" y1="270" x2="250" y2="330" stroke="#7a5230" stroke-width="6" stroke-linecap="round"/>
    <rect width="400" height="400" fill="none" stroke="#5a4632" stroke-width="6"/>
  </g>

  <!-- 第三格（左下）：開心的事（與人相聚/通話） -->
  <g transform="translate(15,435)">
    <rect width="400" height="400" fill="#fff0f3"/>
    <rect y="300" width="400" height="100" fill="#f6d9b8"/>
    <path d="M200 70 c-14 -22 -50 -12 -50 14 c0 22 34 38 50 52 c16 -14 50 -30 50 -52 c0 -26 -36 -36 -50 -14z" fill="#ff6b81"/>
    <circle cx="140" cy="235" r="30" fill="#f7d4ab"/>
    <path d="M112 232 a28 28 0 0 1 56 0z" fill="#cfcfcf"/>
    <circle cx="132" cy="235" r="4" fill="#2a2118"/>
    <circle cx="150" cy="235" r="4" fill="#2a2118"/>
    <path d="M130 246 q11 12 22 0" fill="none" stroke="#7a4a2a" stroke-width="5" stroke-linecap="round"/>
    <rect x="118" y="268" width="44" height="60" rx="16" fill="#4a90d9"/>
    <rect x="176" y="220" width="26" height="46" rx="6" fill="#333"/>
    <rect x="180" y="226" width="18" height="30" rx="2" fill="#bfe6ff"/>
    <circle cx="280" cy="235" r="26" fill="#f7d4ab"/>
    <path d="M256 230 a24 24 0 0 1 48 0z" fill="#3a2a1c"/>
    <circle cx="272" cy="236" r="3.5" fill="#2a2118"/>
    <circle cx="288" cy="236" r="3.5" fill="#2a2118"/>
    <path d="M270 246 q10 9 20 0" fill="none" stroke="#7a4a2a" stroke-width="4" stroke-linecap="round"/>
    <rect x="262" y="264" width="36" height="60" rx="14" fill="#7ac77a"/>
    <rect width="400" height="400" fill="none" stroke="#5a4632" stroke-width="6"/>
  </g>

  <!-- 第四格（右下）：滿足回到家、傍晚 -->
  <g transform="translate(435,435)">
    <rect width="400" height="400" fill="#ffe9cf"/>
    <circle cx="330" cy="90" r="30" fill="#ff9d4d"/>
    <rect y="300" width="400" height="100" fill="#c9a978"/>
    <rect x="60" y="220" width="140" height="90" fill="#f4e2c4" stroke="#7a5230" stroke-width="5"/>
    <path d="M50 220 L130 160 L210 220 Z" fill="#c0553f"/>
    <rect x="110" y="255" width="40" height="55" fill="#7a5230"/>
    <circle cx="280" cy="250" r="30" fill="#f7d4ab"/>
    <path d="M252 247 a28 28 0 0 1 56 0z" fill="#d8d8d8"/>
    <path d="M266 248 q6 -8 12 0" fill="none" stroke="#2a2118" stroke-width="4" stroke-linecap="round"/>
    <path d="M284 248 q6 -8 12 0" fill="none" stroke="#2a2118" stroke-width="4" stroke-linecap="round"/>
    <path d="M268 262 q14 14 28 0" fill="none" stroke="#7a4a2a" stroke-width="5" stroke-linecap="round"/>
    <circle cx="258" cy="262" r="7" fill="#f6a9a0" opacity="0.6"/>
    <circle cx="302" cy="262" r="7" fill="#f6a9a0" opacity="0.6"/>
    <rect width="400" height="400" fill="none" stroke="#5a4632" stroke-width="6"/>
  </g>
</svg>
